<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Penitipan Barang</title>

<!-- Panggil CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>PEBA</h2>
    <a href="#">Dashboard</a>
</div>

<div class="main">

    <!-- CARDS -->
    <div class="cards">
        <div class="card blue">
            <h3 id="total">0</h3>
            <p>Total Barang</p>
        </div>
        <div class="card green">
            <h3 id="masuk">0</h3>
            <p>Barang Masuk</p>
        </div>
        <div class="card red">
            <h3 id="keluar">0</h3>
            <p>Barang Keluar</p>
        </div>
    </div>

    <div class="form-container">
  <h2>Form Titip Barang</h2>

  <div class="form-grid">

    <div class="form-group">
      <label>Nama Lengkap *</label>
      <input type="text" id="nama">
    </div>

    <div class="form-group">
      <label>Prodi *</label>
      <input type="text" id="prodi">
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="email">
    </div>

    <div class="form-group">
      <label>Tingkat *</label>
      <input type="text" id="tingkat">
    </div>

    <div class="form-group">
      <label>No HP *</label>
      <input type="text" id="hp">
    </div>

    <div class="form-group">
      <label>Nama Barang *</label>
      <input type="text" id="barang">
    </div>

  </div>

  <button onclick="tambahData()" class="btn-simpan">
    SIMPAN
    
</button>
  
</div>
        <!-- QRIS -->
        <div class="qris">
            <p>Di isi dengan benar ya</p>
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/QRIS_logo.svg">
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-box">
    <h3>Data Penitipan Barang</h3>

    <table>
        <thead>
            <tr>
                <th>no</th>
                <th>nama lengkap</th>
                <th>email</th>
                <th>no HP</th>
                <th>prodi</th>
                <th>tingkat</th>
                <th>nama barang</th>
                <th>waktu titip</th>
                <th>status</th>
                <th>aksi</th>
            </tr>
        </thead>

        <tbody id="dataTable">
            <!-- data muncul di sini -->
        </tbody>
    </table>
</div>

</div>

<!-- Panggil JS -->
<script src="script.js"></script>

</body>
</html>
